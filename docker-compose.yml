version: '3.8'

services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lamp_web
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./logs:/var/log/apache2
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: lamp_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpass
    volumes:
      - ./db:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: lamp_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: devuser
      PMA_PASSWORD: devpass
    depends_on:
      - db
